openapi: 3.1.0
info:
  title: Security fixture create session token
  version: 1.0.0
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
paths:
  /v1/session_tokens:
    post:
      operationId: create-session-token
      security:
        - basicAuth: []
      responses:
        '200':
          description: Session token created
