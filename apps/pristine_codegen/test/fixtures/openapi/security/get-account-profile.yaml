openapi: 3.1.0
info:
  title: Security fixture get account profile
  version: 1.0.0
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
paths:
  /v1/accounts/me:
    get:
      operationId: get-account-profile
      responses:
        '200':
          description: Current account profile
